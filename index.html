<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenType | Speed Test</title>
    <style>
        /* --- CSS VARIABLES FOR THEMES --- */
        :root {
            /* Light Mode: Deep Sage Vibe with High-Contrast Text */
            --bg-body: #8eb397; 
            --bg-container: #769e81;
            
            /* Text Colors */
            --text-main: #ffffff;      /* Typed words are stark white for high contrast */
            --text-muted: #2c4233;     /* Untyped words are dark smoky green for readability */
            
            /* Accents */
            --accent: #2c4233;         /* Dark green for headers and stats */
            --caret: #4ade80;          /* Bright green underline for current letter */
            
            /* Status Colors */
            --error: #ff4d4d;          /* Bright red for errors */
            --correct: #ffffff;        /* White for correct */
        }

        [data-theme="dark"] {
            /* Dark Mode: Dark Blackish-Green (Unchanged) */
            --bg-body: #0d1711;
            --bg-container: #15261c;
            --text-main: #e2ede5;
            --text-muted: #5c7a65;
            --accent: #4ade80;
            --caret: #4ade80;
            --error: #f87171;
            --correct: #86efac;
        }

        * {
            box-sizing: border-box;
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* --- HEADER & TOGGLE --- */
        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        h1 {
            margin: 0;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .toggle-btn {
            background-color: var(--bg-container);
            color: var(--text-main);
            border: 2px solid var(--text-main);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
        }

        .toggle-btn:hover {
            background-color: var(--text-main);
            color: var(--bg-container);
        }

        /* --- TYPING CONTAINER --- */
        .typing-container {
            background-color: var(--bg-container);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            width: 90%;
            max-width: 800px;
        }

        /* --- STATS PANEL --- */
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            font-size: 1.2rem;
            font-weight: 600;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 15px;
            color: var(--text-main);
        }

        .stat-box span {
            color: var(--text-main);
            font-size: 1.5rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* --- TEXT DISPLAY & INPUT --- */
        .text-display {
            font-size: 1.5rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: var(--text-muted); /* Dark text for readability */
            user-select: none;
            font-weight: 500;
        }

        .text-display span.correct {
            color: var(--correct); /* Turns white when typed */
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .text-display span.incorrect {
            color: var(--error);
            text-decoration: underline;
            text-decoration-thickness: 3px;
        }

        .text-display span.active {
            color: var(--text-muted); 
            border-bottom: 3px solid var(--caret); /* Bright green underline */
        }

        .type-input {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: var(--text-main);
            border-radius: 8px;
            outline: none;
        }

        .type-input:focus {
            border-color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.2);
        }

        .type-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        /* --- RESTART BUTTON --- */
        .restart-btn {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            background-color: transparent;
            color: var(--text-main);
            border: 2px solid var(--text-main);
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .restart-btn:hover {
            background-color: var(--text-main);
            color: var(--bg-container);
        }
    </style>
</head>
<body>

    <header>
        <h1>ZenType</h1>
        <button class="toggle-btn" id="theme-toggle">🌙 Dark Mode</button>
    </header>

    <div class="typing-container">
        <div class="stats">
            <div class="stat-box">Time: <span id="time">60</span>s</div>
            <div class="stat-box">WPM: <span id="wpm">0</span></div>
            <div class="stat-box">Accuracy: <span id="accuracy">100</span>%</div>
        </div>

        <div class="text-display" id="text-display"></div>
        
        <input type="text" class="type-input" id="type-input" placeholder="Start typing here..." autocomplete="off">
        
        <button class="restart-btn" id="restart-btn">Restart Test</button>
    </div>

    <script>
        // --- 1. WEB AUDIO API FOR TYPING SOUND ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playClickSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.03);
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.03);
        }

        // --- 2. DARK MODE LOGIC ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        let isDarkMode = false;

        themeToggleBtn.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.body.setAttribute('data-theme', 'dark');
                themeToggleBtn.innerText = '☀️ Light Mode';
            } else {
                document.body.removeAttribute('data-theme');
                themeToggleBtn.innerText = '🌙 Dark Mode';
            }
        });

        // --- 3. TYPING TEST LOGIC ---
        const sampleTexts = [
            "Cloud computing delivers computing services including servers, storage, databases, networking, software, and analytics over the internet.",
            "Deploying an application using a continuous integration and continuous deployment pipeline ensures code reliability and rapid updates.",
            "Serverless architecture allows developers to build and run applications without having to manage the underlying infrastructure."
        ];

        const textDisplay = document.getElementById('text-display');
        const typeInput = document.getElementById('type-input');
        const timeElement = document.getElementById('time');
        const wpmElement = document.getElementById('wpm');
        const accuracyElement = document.getElementById('accuracy');
        const restartBtn = document.getElementById('restart-btn');

        let timer = 60;
        let timeLeft = timer;
        let timeElapsed = 0;
        let timerInterval = null;
        let isTyping = false;
        let currentText = "";
        let charactersTyped = 0;
        let correctCharacters = 0;

        function initTest() {
            currentText = sampleTexts[Math.floor(Math.random() * sampleTexts.length)];
            textDisplay.innerHTML = '';
            
            currentText.split('').forEach(char => {
                let span = document.createElement('span');
                span.innerText = char;
                textDisplay.appendChild(span);
            });
            textDisplay.querySelectorAll('span')[0].classList.add('active');

            typeInput.value = '';
            typeInput.disabled = false;
            timeLeft = timer;
            timeElapsed = 0;
            charactersTyped = 0;
            correctCharacters = 0;
            isTyping = false;
            clearInterval(timerInterval);
            
            timeElement.innerText = timeLeft;
            wpmElement.innerText = 0;
            accuracyElement.innerText = 100;
        }

        function updateTimer() {
            if (timeLeft > 0) {
                timeLeft--;
                timeElapsed++;
                timeElement.innerText = timeLeft;
                
                let wpm = Math.round(((correctCharacters / 5) / timeElapsed) * 60);
                wpmElement.innerText = isNaN(wpm) || wpm < 0 ? 0 : wpm;
            } else {
                clearInterval(timerInterval);
                typeInput.disabled = true;
            }
        }

        typeInput.addEventListener('input', () => {
            playClickSound();

            if (!isTyping) {
                timerInterval = setInterval(updateTimer, 1000);
                isTyping = true;
            }

            const arrayQuote = textDisplay.querySelectorAll('span');
            const arrayValue = typeInput.value.split('');
            
            charactersTyped++;
            correctCharacters = 0;

            let allCorrect = true;

            arrayQuote.forEach((characterSpan, index) => {
                const character = arrayValue[index];
                
                characterSpan.classList.remove('active');

                if (character == null) {
                    characterSpan.classList.remove('correct');
                    characterSpan.classList.remove('incorrect');
                    allCorrect = false;
                } else if (character === characterSpan.innerText) {
                    characterSpan.classList.add('correct');
                    characterSpan.classList.remove('incorrect');
                    correctCharacters++;
                } else {
                    characterSpan.classList.remove('correct');
                    characterSpan.classList.add('incorrect');
                    allCorrect = false;
                }
            });

            if(arrayValue.length < arrayQuote.length) {
                arrayQuote[arrayValue.length].classList.add('active');
            }

            let accuracy = Math.round((correctCharacters / arrayValue.length) * 100);
            accuracyElement.innerText = isNaN(accuracy) ? 100 : accuracy;

            if (arrayValue.length === arrayQuote.length && allCorrect) {
                clearInterval(timerInterval);
                typeInput.disabled = true;
            }
        });

        restartBtn.addEventListener('click', initTest);

        initTest();
    </script>
</body>
</html>
